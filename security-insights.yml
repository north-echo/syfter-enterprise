header:
  schema-version: 2.0.0
  last-updated: '2026-01-24'
  last-reviewed: '2025-01-24'
  url: https://github.com/vdanen/syfter
  comment: |
    This file contains the minimum information for both project and repository.
    It not required to include both a project and repository section if the project
    section is intended to be inherited by repositories via header.project-si-source

project:
  name: syfter
  administrators:
    - name: Vincent Danen
      social: https://x.com/vdanen
      primary: true
  repositories:
    - name: syfter
      url: https://github.com/vdanen/syfter
      comment: |
        syfter is the core repository for the syfter python module
  vulnerability-reporting:
    reports-accepted: true
    bug-bounty-available: false
    comment: |
      Any vulnerabilities can be reported in GitHub issues

repository:
  url: https://github.com/vdanen/syfter
  status: active
  accepts-change-request: true
  accepts-automated-change-request: false
  core-team:
    - name:        Vincent Danen
      social:      https://x.com/vdanen
      primary:     true
  license:
    url: https://github.com/vdanen/syfter/blob/main/LICENSE.txt
    expression: Apache-2.0
  release:
    changelog: https://github.com/vdanen/syfter/releases
    automated-pipeline: false
    distribution-points:
      - uri:  https://github.com/vdanen/syfter/releases
        comment: GitHub Release Page
      - uri: https://pypi.org/project/syfter/
        comment: PyPI Package
    license:
      url: https://example.com/release/{version}#license
      expression: MIT AND Apache-2.0
  security:
    assessments:
      self:
        evidence: https://www.bestpractices.dev/projects/11827
        date: '2026-01-24'
        comment: |
          OpenSSF best practices badge

