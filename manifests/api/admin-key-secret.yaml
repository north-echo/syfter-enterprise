apiVersion: v1
kind: Secret
metadata:
  name: syfter-admin-key
  namespace: syfter
  labels:
    app: syfter-api
type: Opaque
stringData:
  # Generate with: python3 -c "import secrets; print(secrets.token_hex(32))"
  # This key seeds the first admin API key in the database on startup.
  # Team keys are then created via: POST /api/v1/admin/keys/
  api-key: "REPLACE_WITH_GENERATED_KEY"
