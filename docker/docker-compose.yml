version: '3.8'

services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: syfter-postgres
    environment:
      POSTGRES_USER: syfter
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-syfter_secret}
      POSTGRES_DB: syfter
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U syfter"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # MinIO object storage (S3-compatible)
  minio:
    image: minio/minio:latest
    container_name: syfter-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  # RH-Syfter API server
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: syfter-api
    environment:
      # Database configuration
      SYFTER_DB_TYPE: postgresql
      SYFTER_PG_HOST: postgres
      SYFTER_PG_PORT: 5432
      SYFTER_PG_DATABASE: syfter
      SYFTER_PG_USER: syfter
      SYFTER_PG_PASSWORD: ${POSTGRES_PASSWORD:-syfter_secret}

      # Storage configuration
      SYFTER_STORAGE_TYPE: s3
      SYFTER_S3_ENDPOINT: http://minio:9000
      SYFTER_S3_BUCKET: syfter-sboms
      SYFTER_S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      SYFTER_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      SYFTER_S3_USE_SSL: "false"

      # Server configuration
      SYFTER_HOST: 0.0.0.0
      SYFTER_PORT: 8000
      SYFTER_WORKERS: 4
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    # Large SBOM uploads need more memory and longer timeouts
    # For RHEL-sized scans (~1GB compressed), need 8GB+ to handle decompression and parsing
    deploy:
      resources:
        limits:
          memory: 12G
        reservations:
          memory: 2G

volumes:
  postgres_data:
  minio_data:
