version: '3.8'

services:
  # PostgreSQL database
  # Note: On ARM Macs, use 'podman-compose --podman-build-args="--platform linux/arm64" up -d'
  # or set DOCKER_DEFAULT_PLATFORM=linux/arm64
  postgres:
    image: postgres:16-alpine
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/amd64}
    container_name: syfter-postgres
    environment:
      POSTGRES_USER: syfter
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-syfter_secret}
      POSTGRES_DB: syfter
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    # Tune PostgreSQL for bulk imports
    command:
      - "postgres"
      - "-c" 
      - "max_wal_size=4GB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "work_mem=256MB"
      - "-c"
      - "maintenance_work_mem=512MB"
      - "-c"
      - "wal_buffers=64MB"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U syfter"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # MinIO object storage (S3-compatible)
  minio:
    image: minio/minio:latest
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/amd64}
    container_name: syfter-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  # Syfter API server
  api:
    build:
      context: ..
      dockerfile: podman/Containerfile
      platforms:
        - ${DOCKER_DEFAULT_PLATFORM:-linux/amd64}
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/amd64}
    container_name: syfter-api
    environment:
      # Database configuration
      SYFTER_DB_TYPE: postgresql
      SYFTER_PG_HOST: postgres
      SYFTER_PG_PORT: 5432
      SYFTER_PG_DATABASE: syfter
      SYFTER_PG_USER: syfter
      SYFTER_PG_PASSWORD: ${POSTGRES_PASSWORD:-syfter_secret}

      # Storage configuration
      SYFTER_STORAGE_TYPE: s3
      SYFTER_S3_ENDPOINT: http://minio:9000
      # External endpoint for presigned URLs (accessible from client)
      SYFTER_S3_EXTERNAL_ENDPOINT: ${SYFTER_S3_EXTERNAL_ENDPOINT:-http://localhost:9000}
      SYFTER_S3_BUCKET: syfter-sboms
      SYFTER_S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      SYFTER_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      SYFTER_S3_USE_SSL: "false"

      # Server configuration
      SYFTER_HOST: 0.0.0.0
      SYFTER_PORT: 8000
      SYFTER_WORKERS: 2
      # Set to 0 to always index files (requires sufficient memory)
      # Set to a number to auto-skip file indexing above that threshold
      SYFTER_SKIP_FILE_INDEX_THRESHOLD: ${SYFTER_SKIP_FILE_INDEX_THRESHOLD:-0}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    # Large SBOM uploads need more memory and longer timeouts
    # For RHEL-sized scans (~1GB compressed), need 8GB+ to handle decompression and parsing
    deploy:
      resources:
        limits:
          memory: 12G
        reservations:
          memory: 2G

volumes:
  postgres_data:
  minio_data:
