# Example products configuration for batch scanning
#
# Format: target product version "description"
#
# Lines starting with # are comments
# Empty lines are ignored
#
# Examples:

# RHEL versions
/mnt/repos/rhel10/x86_64/rpms rhel 10.0 "Red Hat Enterprise Linux 10.0"
/mnt/repos/rhel9/x86_64/rpms rhel 9.4 "Red Hat Enterprise Linux 9.4"
/mnt/repos/rhel8/x86_64/rpms rhel 8.10 "Red Hat Enterprise Linux 8.10"

# Container images
registry.redhat.io/ubi9:latest ubi 9.0 "Universal Base Image 9"
registry.redhat.io/ubi8:latest ubi 8.0 "Universal Base Image 8"

# OpenShift
/mnt/repos/ocp/4.14/rpms openshift 4.14 "OpenShift Container Platform 4.14"
